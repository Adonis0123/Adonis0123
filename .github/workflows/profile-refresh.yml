name: Profile Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * 1"

permissions:
  contents: write

jobs:
  refresh-recent-repositories:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh recent repositories data
        env:
          PROFILE_USERNAME: Adonis0123
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RECENT_REPO_COUNT: "3"
          FIXED_FEATURED_REPOS: Adonis0123/adonis-kit,Adonis0123/adonis-skills
          FALLBACK_REPOS: ""
          BLOCKED_REPOS: Adonis0123/Adonis0123
        run: node scripts/select-recent-repos.mjs

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No profile updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/profile.projects.json
          git commit -m "chore(profile): refresh recent repositories"
          git push
